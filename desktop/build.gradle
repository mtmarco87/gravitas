sourceSets.main.resources.srcDirs = ['../assets']

application {
    mainClass = 'com.gravitas.desktop.DesktopLauncher'
    // Required on macOS: GLFW/LWJGL3 must run on the first thread of the process.
    if (org.gradle.internal.os.OperatingSystem.current().isMacOsX()) {
        applicationDefaultJvmArgs = ['-XstartOnFirstThread']
    }
}

jar {
    archiveFileName = 'gravitas.jar'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    dependsOn ':core:jar'
    manifest {
        attributes 'Main-Class': 'com.gravitas.desktop.DesktopLauncher'
    }
    from { configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) } }
}
